spring:
  config:
    import: optional:file:.env[.properties]

  h2:
    console:
      path: /h2-console
      enabled: 'true'
  datasource:
    password: ''
    driver-class-name: org.h2.Driver
    username: sa
    url: jdbc:h2:mem:testdb
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: 'true'
    database-platform: org.hibernate.dialect.H2Dialect
    properties:
      hibernate:
        format_sql: 'true'
openai:
  secret: ${AI_KEY}
  url: ${AI_URL}

logging:
  level:
    root: INFO