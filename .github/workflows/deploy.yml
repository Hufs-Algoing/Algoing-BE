name: Deploy to AWS EC2

on:
  push:
    branches:
      - 'release*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Check JAR file
        run: ls -al build/libs

      - name: Copy build jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "/home/ec2-user/app/"

      - name: Deploy and run on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            pkill -f 'java -jar' || true
            sleep 5
            cd /home/ec2-user/app
            export $(cat .env | xargs)
            cd /home/ec2-user/app/build/libs
            nohup java -jar algoing-0.0.1-SNAPSHOT.jar \
            1>/home/ec2-user/app/nohup_stdout.log \
            2>/home/ec2-user/app/nohup_stderr.log < /dev/null &
