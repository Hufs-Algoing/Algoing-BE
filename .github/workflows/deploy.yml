- name: Deploy and run on EC2
  uses: appleboy/ssh-action@v0.1.10
  with:
    host: ${{ secrets.EC2_HOST }}
    username: ${{ secrets.EC2_USER }}
    key: ${{ secrets.EC2_SSH_KEY }}
    script: |
      echo "=== Killing existing application ==="
      pkill -f 'java -jar' || true
      sleep 5

      echo "=== Move to app dir ==="
      cd /home/ec2-user/app

      echo "=== Load .env if exists ==="
      if [ -f .env ]; then
        echo ".env exists, loading..."
        cat .env
        export $(cat .env | xargs)
      else
        echo "No .env file found"
      fi

      echo "=== List app directory ==="
      ls -al /home/ec2-user/app

      echo "=== Try running JAR ==="
      if [ -f algoing-0.0.1-SNAPSHOT.jar ]; then
        nohup java -jar algoing-0.0.1-SNAPSHOT.jar \
          1>/home/ec2-user/app/nohup_stdout.log \
          2>/home/ec2-user/app/nohup_stderr.log < /dev/null & disown
        echo "=== JAR executed ==="
      else
        echo "JAR file not found!"
        exit 1
      fi
