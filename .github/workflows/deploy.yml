name: Deploy to AWS EC2

on:
  push:
    branches:
      - 'release*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/algoing-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/app/"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            
            echo "> 기존 프로세스 확인"
             CURRENT_PID=$(pgrep -f 'java.*algoing.*jar' | grep -v "$(echo $$)" || true)
            
             if [ -z "$CURRENT_PID" ]; then
               echo ">  현재 실행중인 애플리케이션이 없으므로 종료하지 않습니다."
             else
               echo "> kill -9 $CURRENT_PID"
               kill -9 $CURRENT_PID
               sleep 5
             fi

            echo "2. .env 있는 디렉토리 이동 및 환경변수 로드"
            cd /home/ec2-user/app || { echo "app 디렉토리 없음"; exit 1; }
            pwd
            if [ -f .env ]; then
              set -o allexport
              source .env
              set +o allexport
              echo "환경변수 로드됨"
            else
              echo ".env 파일 없음"
            fi

            echo "3. JAR 파일 존재 확인"
            ls -la build/libs/algoing-0.0.1-SNAPSHOT.jar || { echo "JAR 파일 없음"; exit 1; }

            echo "4. 애플리케이션 시작"
            nohup java -jar build/libs/algoing-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
            sleep 5

            APP_PID=$(pgrep -f 'java.*algoing.*jar')

            echo "5. 실행 중인지 확인"
            if [ -n "$APP_PID" ]; then
              echo "배포 성공 (PID: $APP_PID)"
            else
              echo "배포 실패"
              echo "=== app.log ==="
              cat app.log
              echo "현재 디렉토리 파일 리스트"
              ls -la
              echo "build/libs 디렉토리 파일 리스트"
              ls -la build/libs
              exit 1
            fi