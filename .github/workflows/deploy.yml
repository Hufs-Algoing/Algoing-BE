name: Deploy to AWS EC2

on:
  push:
    branches:
      - 'release*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean build -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "build/libs/algoing-0.0.1-SNAPSHOT.jar"
          target: "/home/ec2-user/app/"

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "1. 기존 프로세스 확인"
            JAVA_PID=$(pgrep -f 'java.*algoing.*jar' || true)
            if [ -n "$JAVA_PID" ]; then
              echo "기존 프로세스 발견 (PID: $JAVA_PID), 종료 중..."
              kill $JAVA_PID || echo "프로세스가 이미 종료됨"
              sleep 3
            else
              echo "종료할 프로세스 없음"
            fi

            echo "2. .env 있는 디렉토리 이동 및 환경변수 로드"
            cd /home/ec2-user/app || { echo "app 디렉토리 없음"; exit 1; }
            pwd
            if [ -f .env ]; then
              set -o allexport
              source .env
              set +o allexport
              echo "환경변수 로드됨"
            else
              echo ".env 파일 없음"
            fi

            echo "3. JAR 파일 존재 확인"
            ls -la build/libs/algoing-0.0.1-SNAPSHOT.jar || { echo "JAR 파일 없음"; exit 1; }

            echo "4. 애플리케이션 시작"
            nohup java -jar build/libs/algoing-0.0.1-SNAPSHOT.jar > app.log 2>&1 &
            APP_PID=$!
            echo "시작된 PID: $APP_PID"

            echo "5. 시작 대기 및 확인"
            sleep 5
            if kill -0 $APP_PID 2>/dev/null; then
              echo "배포 성공 (PID: $APP_PID)"
            else
              echo "배포 실패"
              echo "=== 로그 내용 ==="
              cat app.log
              exit 1
            fi
