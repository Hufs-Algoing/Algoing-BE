name: Deploy to EC2 on release branch push

on:
  push:
    branches:
      - 'release*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            echo "[1] 디렉토리 이동"
            cd /home/ec2-user/app

            echo "[2] 최신 코드 pull"
            git pull origin $(echo $GITHUB_REF | sed 's#refs/heads/##')

            echo "[3] build 시작"
            ./gradlew clean build -x test

            echo "[4] 기존 프로세스 종료"
            pkill -f 'java -jar' || true

            echo "[5] .env 환경 변수 export"
            export $(cat .env | xargs)

            echo "[6] 애플리케이션 실행"
            nohup java -jar build/libs/*SNAPSHOT.jar > app.log 2>&1 & disown
